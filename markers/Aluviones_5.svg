<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
<!-- Montaña / Terreno principal (Marrón base) -->
  <path d="M 12.5 12.5 L 12.5 487.5 L 487.5 487.5 C 387.5 412.5 287.5 362.5 287.5 362.5 L 112.5 187.5 Z" fill="#8D5B27" />

  <!-- Líneas de textura y relieve en la montaña -->
  <g stroke="#613E1B" stroke-width="20" stroke-linecap="round" fill="none">
    <path d="M 62.5 212.5 L 112.5 312.5 L 262.5 412.5" />
    <path d="M 37.5 337.5 L 75 412.5" />
    <path d="M 112.5 437.5 L 175 437.5" />
    <path d="M 187.5 300 L 225 325" />
    <path d="M 337.5 400 L 400 437.5" />
  </g>

  <!-- Puntos de textura en la tierra -->
  <g fill="#613E1B">
    <circle cx="93.5" cy="200" r="12.5" />
    <circle cx="287.5" cy="443.5" r="12.5" />
    <circle cx="112.5" cy="462.5" r="8" />
  </g>

  <!-- Casa afectada por el derrumbe -->
  <g>
    <!-- Base de la casa (Amarillo/Naranja) -->
    <path d="M 350 350 L 450 425 L 425 450 L 337.5 375 Z" fill="#FFC107" />
    <!-- Techo (Rojo con bordes redondeados simulados) -->
    <path d="M 337.5 375 L 412.5 293.5 C 418.5 287.5 425 287.5 431.5 293.5 L 475 381 C 481 393.5 471.5 400 456 393.5 Z" fill="#DC3545" />
  </g>

  <!-- Árboles (Troncos y Copas verdes) -->
  <g>
    <!-- Árbol inferior izquierdo -->
    <rect x="93.5" y="387.5" width="15" height="43.5" rx="7.5" transform="rotate(25 93.5 387.5)" fill="#613E1B" />
    <path d="M 125 337.5 C 100 325 75 350 81.5 375 C 68.5 387.5 81.5 412.5 106.5 412.5 C 131.5 418.5 150 393.5 143.5 368.5 C 150 350 137.5 337.5 125 337.5 Z" fill="#A7D129" />

    <!-- Árbol medio -->
    <rect x="225" y="243.5" width="15" height="43.5" rx="7.5" transform="rotate(35 225 243.5)" fill="#613E1B" />
    <path d="M 262.5 181 C 237.5 175 218.5 193.5 218.5 218.5 C 200 231.5 212.5 262.5 237.5 262.5 C 262.5 268.5 287.5 250 281 225 C 293.5 206 281 187.5 262.5 181 Z" fill="#A7D129" />

    <!-- Árbol derecho próximo a la casa -->
    <rect x="306.5" y="306.5" width="15" height="43.5" rx="7.5" transform="rotate(35 306.5 306.5)" fill="#613E1B" />
    <path d="M 343.5 243.5 C 318.5 237.5 300 256 300 281 C 281.5 293.5 293.5 325 318.5 325 C 343.5 331.5 368.5 312.5 362.5 287.5 C 375 268.5 362.5 250 343.5 243.5 Z" fill="#A7D129" />
  </g>

  <!-- Rocas y escombros cayendo (Marrón oscuro) -->
  <g fill="#613E1B">
    <!-- Rocas redondas grandes -->
    <circle cx="143.5" cy="37.5" r="25" />
    <circle cx="150" cy="118.5" r="31.5" />
    <circle cx="187.5" cy="181" r="25" />
    
    <!-- Rocas pequeñas y fragmentos alargados en caída -->
    <circle cx="181" cy="75" r="10" />
    <circle cx="331.5" cy="206" r="10" />
    
    <rect x="56" y="25" width="50" height="20" rx="10" transform="rotate(35 56 25)" />
    <rect x="93.5" y="56" width="37.5" height="15" rx="7.5" transform="rotate(35 93.5 56)" />
    <rect x="112.5" y="93.5" width="43.5" height="17.5" rx="8.5" transform="rotate(35 112.5 93.5)" />
  </g>
</svg>