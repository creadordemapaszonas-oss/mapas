<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">

  <!-- Nube trasera (Marrón/Gris oscuro) -->
  <path d="M 120 200 
           A 45 45 0 0 1 150 120 
           A 65 65 0 0 1 250 80 
           A 55 55 0 0 1 320 130 
           A 45 45 0 0 1 310 210 Z" fill="#756971" />

  <!-- Sombra de la nube trasera reflejada (Intersección intermedia) -->
  <path d="M 190 210 
           A 45 45 0 0 1 240 140 
           A 55 55 0 0 1 315 160 
           A 45 45 0 0 1 310 210 Z" fill="#63585F" />

  <!-- Rayo / Relámpago (Fondo de sombra y cuerpo iluminado) -->
  <g>
    <!-- Sombra superior del rayo (Naranja apagado) -->
    <path d="M 255 290 L 345 290 L 330 340 L 365 345 L 320 420 L 305 345 L 330 340 Z" fill="#FFC75F" />
    <!-- Cuerpo principal del rayo (Amarillo brillante) -->
    <path d="M 255 315 L 345 315 L 330 340 L 368 345 L 295 480 L 305 375 L 255 375 Z" fill="#FFE17D" />
  </g>

  <!-- Nube delantera principal (Gris claro) -->
  <path d="M 140 290 
           A 55 55 0 0 1 120 190 
           A 65 65 0 0 1 220 140 
           A 85 85 0 0 1 370 140 
           A 65 65 0 0 1 480 210 
           A 55 55 0 0 1 440 290 Z" fill="#A89FA6" />

  <!-- Gotas de lluvia (Líneas inclinadas con bordes redondeados) -->
  <g stroke="#00D2FF" stroke-width="14" stroke-linecap="round">
    <!-- Fila superior de lluvia -->
    <line x1="95" y1="315" x2="83" y2="345" />
    <line x1="155" y1="315" x2="143" y2="345" />
    <line x1="215" y1="315" x2="203" y2="345" />

    <!-- Fila central de lluvia -->
    <line x1="72" y1="365" x2="60" y2="395" />
    <line x1="132" y1="365" x2="120" y2="395" />
    <line x1="192" y1="365" x2="180" y2="395" />

    <!-- Fila inferior de lluvia -->
    <line x1="50" y1="415" x2="38" y2="445" />
    <line x1="110" y1="415" x2="98" y2="445" />
    <line x1="170" y1="415" x2="158" y2="445" />
  </g>


</svg>